        - heading "Les combinaisons gagnantes pour un OF" [level=2] [ref=e155]
        - heading "OF de formation continue + RNCP" [level=3] [ref=e156]
        - paragraph [ref=e157]: Vous préparez des apprenants à des titres professionnels reconnus → éligibilité CPF + crédibilité renforcée.
        - heading "OF bilan de compétences" [level=3] [ref=e158]
        - paragraph [ref=e159]: Qualiopi sur la catégorie “bilan de compétences” → accès direct à EDOF sans besoin de RNCP/RS.
        - heading "OF VAE" [level=3] [ref=e160]
        - paragraph [ref=e161]: Qualiopi sur la catégorie VAE → accès aux financements CPF et OPCO pour l’accompagnement VAE.
        - separator [ref=e162]
        - heading "Conclusion" [level=2] [ref=e163]
        - paragraph [ref=e164]: Qualiopi, RNCP, RS et CPF sont quatre briques complémentaires du système de financement de la formation professionnelle française. Maîtriser leur articulation vous permet de maximiser vos sources de revenus et de construire une offre de formation solide et financeable.
        - paragraph [ref=e165]:
