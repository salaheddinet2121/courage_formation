        - 'heading "Qualiopi, RNCP, RS, CPF : comprendre les différences et les liens" [level=1] [ref=e33]'
        - paragraph [ref=e34]: "Qualiopi, RNCP, RS, CPF, EDOF : ces acronymes vous perdent ? Ce guide explique ce que chacun signifie, à quoi il sert et comment ils s'articulent pour votre OF."
      - 'img "Qualiopi, RNCP, RS, CPF : comprendre les différences et les liens" [ref=e36]'
      - generic [ref=e38]:
        - 'heading "Qualiopi, RNCP, RS, CPF : comprendre les différences et les liens" [level=1] [ref=e39]'
        - paragraph [ref=e40]: Dans le secteur de la formation professionnelle, les acronymes se multiplient. Qualiopi, RNCP, RS, CPF, EDOF, OPCO… beaucoup de formateurs confondent ces termes ou ne savent pas exactement comment ils s’articulent.
        - paragraph [ref=e41]: Ce guide démêle tout en moins de 10 minutes.
        - separator [ref=e42]
        - heading "Les 4 notions clés" [level=2] [ref=e43]
        - heading "Qualiopi — La certification qualité de l’organisme" [level=3] [ref=e44]
        - paragraph [ref=e45]:
          - text: Qualiopi est une
          - strong [ref=e46]: certification de la qualité des processus
          - text: "de votre organisme de formation. Elle ne dit rien sur la valeur de vos formations sur le marché de l’emploi — elle certifie que votre OF fonctionne de façon qualitative : analyse des besoins, suivi des apprenants, satisfaction, amélioration continue."
        - paragraph [ref=e47]:
          - strong [ref=e48]: "Délivrée par :"
          - text: un organisme certificateur accrédité par le
          - link "COFRAC" [ref=e49] [cursor=pointer]:
            - /url: https://www.cofrac.fr/
          - strong [ref=e50]: "Durée :"
          - text: 3 ans, renouvelable
          - strong [ref=e51]: "Obligatoire pour :"
          - text: accéder aux financements publics (CPF, OPCO, France Travail…)
        - heading "RNCP — Le Répertoire National des Certifications Professionnelles" [level=3] [ref=e52]
        - paragraph [ref=e53]:
          - text: Le RNCP est le registre des
          - strong [ref=e54]: certifications professionnelles reconnues par l’État
          - text: . Une certification inscrite au RNCP atteste qu’un individu a acquis des compétences reconnues sur le marché du travail (diplômes, titres professionnels, CQP…).
        - paragraph [ref=e55]:
          - strong [ref=e56]: "Géré par :"
          - text: France Compétences
          - strong [ref=e57]: "Concerne :"
          - text: les certifications (pas les organismes)
          - strong [ref=e58]: "Pour les OF :"
          - text: si votre formation prépare à une certification RNCP, elle est éligible au CPF
        - paragraph [ref=e59]:
          - link "Consulter le RNCP sur francetravail.fr" [ref=e60] [cursor=pointer]:
            - /url: https://francetravail.fr/formation.html
        - heading "RS — Le Répertoire Spécifique" [level=3] [ref=e61]
        - paragraph [ref=e62]:
          - text: Le RS enregistre les
          - strong [ref=e63]: certifications de compétences complémentaires
          - text: qui ne correspondent pas à un bloc de compétences d’une certification RNCP. On y trouve souvent des certifications de compétences transversales (langues, numérique, management…).
        - paragraph [ref=e64]:
          - strong [ref=e65]: "Exemple :"
          - text: le TOSA (compétences bureautiques), le CLÉA (socle de compétences)
        - paragraph [ref=e66]:
          - strong [ref=e67]: "Pour les OF :"
          - text: une formation préparant à une certification RS est également éligible au CPF.
        - heading "CPF — Le Compte Personnel de Formation" [level=3] [ref=e68]
        - paragraph [ref=e69]:
          - text: Le CPF est le
          - strong [ref=e70]: dispositif de financement
          - text: qui permet à tout actif (salarié ou non) de financer une formation via ses droits accumulés tout au long de sa carrière. Depuis 2019, le CPF est monétisé (en euros, non plus en heures).
        - paragraph [ref=e71]:
          - strong [ref=e72]: "Montant moyen :"
          - text: 500€ par an (jusqu’à 5 000€ cumulés, 8 000€ pour les peu qualifiés)
          - strong [ref=e73]: "Géré par :"
          - text: la Caisse des Dépôts sur
          - link "moncompteformation.gouv.fr" [ref=e74] [cursor=pointer]:
            - /url: https://www.moncompteformation.gouv.fr/
        - separator [ref=e75]
        - heading "Comment ces éléments s’articulent pour votre OF ?" [level=2] [ref=e76]
        - code [ref=e78]:
          - generic [ref=e79]: Votre OF obtient QUALIOPI
          - generic [ref=e80]: ↓
          - generic [ref=e81]: Vous pouvez accéder aux financements publics
          - generic [ref=e82]: ↓
          - generic [ref=e83]: "Pour le CPF spécifiquement :"
          - generic [ref=e84]: Votre formation doit préparer à une certification RNCP ou RS
          - generic [ref=e85]: ↓
          - generic [ref=e86]: Vous vous inscrivez sur EDOF (plateforme Caisse des Dépôts)
          - generic [ref=e87]: ↓
          - generic [ref=e88]: Votre formation apparaît sur Mon Compte Formation
          - generic [ref=e89]: ↓
          - generic [ref=e90]: Les apprenants peuvent financer avec leur CPF
        - separator [ref=e91]
        - heading "Qualiopi seule suffit-elle pour le CPF ?" [level=2] [ref=e92]
        - paragraph [ref=e93]:
          - strong [ref=e94]: Non.
          - text: "Qualiopi est une condition nécessaire mais pas suffisante. Pour qu’une formation soit éligible au CPF, elle doit également :"
        - list [ref=e95]:
          - listitem [ref=e96]:
            - strong [ref=e97]: Préparer à une certification inscrite au RNCP ou au RS
          - listitem [ref=e98]:
            - strong [ref=e99]: Être référencée sur la plateforme EDOF
          - listitem [ref=e100]: Répondre à d’autres critères spécifiques (absence de condamnation pénale, NDA valide…)
        - paragraph [ref=e101]: Si votre formation ne prépare pas à une certification RNCP/RS, elle ne peut pas être financée par le CPF — même si vous avez Qualiopi.
        - separator [ref=e102]
        - heading "Peut-on créer une certification RNCP ou RS ?" [level=2] [ref=e103]
        - paragraph [ref=e104]: Oui, mais c’est une démarche longue et exigeante. France Compétences examine les demandes de création ou de renouvellement de certifications.
        - paragraph [ref=e105]: "Pour les OF, deux voies :"
        - list [ref=e106]:
          - listitem [ref=e107]:
            - strong [ref=e108]: Créer sa propre certification
            - text: et la faire enregistrer au RNCP ou RS (processus long, 1 à 2 ans)
          - listitem [ref=e109]:
            - strong [ref=e110]: Préparer à une certification existante
            - text: enregistrée par un autre organisme (Pôle emploi formation, universités, branches professionnelles…)
        - paragraph [ref=e111]:
          - link "Procédure d’enregistrement sur francetravail.fr" [ref=e112] [cursor=pointer]:
            - /url: https://francetravail.fr/formation.html
